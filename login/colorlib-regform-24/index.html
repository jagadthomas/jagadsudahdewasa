<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Registrasi</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<!-- MATERIAL DESIGN ICONIC FONT -->
		<link rel="stylesheet" href="fonts/material-design-iconic-font/css/material-design-iconic-font.min.css">
		
		<!-- STYLE CSS -->
		<link rel="stylesheet" href="css/style.css">
	</head>

	<body>

		<div class="wrapper">
			<div class="image-holder">
				<img src="images/registration-form-8.jpg" alt="">
			</div>
			<div class="form-inner">
				<form action="" id="registerForm" onsubmit="return false;">
					<div class="form-header">
						<h3>Daftar</h3>
						<img src="images/sign-up.png" alt="" class="sign-up-icon">
					</div>
					<div class="form-group">
						<label for="">Nama Pengguna:</label>
						<input type="text" class="form-control" data-validation="length alphanumeric" data-validation-length="3-12" id="username">
					</div>
					<div class="form-group">
						<label for="">E-mail:</label>
						<input type="text" class="form-control" data-validation="email" id="email">
					</div>
					<div class="form-group" >
						<label for="">Kata Sandi:</label>
						<input type="password" class="form-control" data-validation="length" data-validation-length="min8" id="password">
					</div>
					<button>buat akun saya</button>
					<div class="socials">
						<p>Daftar dengan platform sosial</p>
						<a href="" class="socials-icon">
							<i class="zmdi zmdi-facebook"></i>
						</a>
						<a href="" class="socials-icon">
							<i class="zmdi zmdi-instagram"></i>
						</a>
						<a href="" class="socials-icon">
							<i class="zmdi zmdi-twitter"></i>
						</a>
						<a href="" class="socials-icon">
							<i class="zmdi zmdi-tumblr"></i>
						</a>
					</div>
				</form>
			</div>
			
		</div>
		
		<script src="js/jquery-3.3.1.min.js"></script>
		<script src="js/jquery.form-validator.min.js"></script>
		<script src="js/main.js"></script>

		<p id="message"></p>
		<script src="js/register.js" defer></script>
	</body><!-- This templates was made by Colorlib (https://colorlib.com) -->
</html>
